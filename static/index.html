<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>阿里云录音识别与翻译</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar" aria-label="音频输入">
        <div class="brand">
          <h1>录音识别与翻译</h1>
          <p>麦克风录音、单文件、多文件或目录批量上传。</p>
        </div>

        <div class="controls">
          <div class="control-group recorder">
            <button id="recordButton" class="primary" type="button">开始录音</button>
            <button id="stopButton" type="button" disabled>停止</button>
            <span id="recordState" class="state">未录音</span>
          </div>

          <div class="control-group">
            <label class="file-button">
              单个音频
              <input id="singleInput" type="file" accept="audio/*,video/*" />
            </label>
            <label class="file-button">
              选择多个
              <input id="multiInput" type="file" accept="audio/*,video/*" multiple />
            </label>
            <label class="file-button">
              选择目录
              <input id="directoryInput" type="file" accept="audio/*,video/*" multiple webkitdirectory />
            </label>
          </div>

          <div class="control-group runbar">
            <button id="clearButton" type="button">清空</button>
            <select id="asrProvider" aria-label="识别引擎">
              <option value="aliyun">引擎：阿里 Fun-ASR</option>
              <option value="cloudflare">引擎：Cloudflare Whisper</option>
            </select>
            <select id="recognitionLanguage" aria-label="识别语言">
              <option value="zh">识别：中文</option>
              <option value="en">识别：英语</option>
              <option value="zh,en">识别：中文/英语</option>
              <option value="ja">识别：日语</option>
              <option value="ko">识别：韩语</option>
              <option value="vi">识别：越南语</option>
              <option value="th">识别：泰语</option>
              <option value="id">识别：印尼语</option>
              <option value="ms">识别：马来语</option>
              <option value="tl">识别：菲律宾语</option>
              <option value="hi">识别：印地语</option>
              <option value="ar">识别：阿拉伯语</option>
              <option value="fr">识别：法语</option>
              <option value="de">识别：德语</option>
              <option value="es">识别：西班牙语</option>
              <option value="pt">识别：葡萄牙语</option>
              <option value="ru">识别：俄语</option>
              <option value="it">识别：意大利语</option>
              <option value="nl">识别：荷兰语</option>
              <option value="sv">识别：瑞典语</option>
              <option value="da">识别：丹麦语</option>
              <option value="fi">识别：芬兰语</option>
              <option value="no">识别：挪威语</option>
              <option value="el">识别：希腊语</option>
              <option value="pl">识别：波兰语</option>
              <option value="cs">识别：捷克语</option>
              <option value="hu">识别：匈牙利语</option>
              <option value="ro">识别：罗马尼亚语</option>
              <option value="bg">识别：保加利亚语</option>
              <option value="hr">识别：克罗地亚语</option>
              <option value="sk">识别：斯洛伐克语</option>
            </select>
            <button id="transcribeButton" class="primary" type="button" disabled>开始识别</button>
            <select id="targetLanguage" aria-label="翻译目标语言">
              <option value="zh">翻译成中文</option>
              <option value="en">翻译成英文</option>
            </select>
            <button id="translateButton" type="button" disabled>翻译</button>
          </div>
        </div>
      </section>

      <section class="statusbar" aria-live="polite">
        <div>
          <strong id="fileCount">0</strong>
          <span>个文件</span>
        </div>
        <div>
          <strong id="jobState">待选择</strong>
          <span id="progressText"></span>
        </div>
      </section>

      <section class="table-wrap" aria-label="识别和翻译结果">
        <table>
          <thead>
            <tr>
              <th class="name-col">文件名</th>
              <th>识别原文</th>
              <th>翻译结果</th>
            </tr>
          </thead>
          <tbody id="resultBody">
            <tr class="empty">
              <td colspan="3">请选择音频文件或直接录音。</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script src="/static/app.js?v=20260630-cloudflare"></script>
  </body>
</html>
